<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>필사</title>
<meta name="description" content="필사 — a bilingual reading journal" />
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ════════════════════════ LOGIN ════════════════════════ -->
<div class="auth" id="authView" hidden>
  <div class="auth-card">
    <div class="auth-mark">필사</div>
    <p class="auth-tagline">두 언어를 건너는 한 사람의 기록</p>
    <form class="auth-form" id="authForm" autocomplete="on">
      <input class="auth-input" id="authEmail" type="email" placeholder="이메일" autocomplete="username" required />
      <input class="auth-input" id="authPassword" type="password" placeholder="비밀번호" autocomplete="current-password" required minlength="6" />
      <button class="auth-submit" id="authSubmit" type="submit">로그인</button>
    </form>
    <div class="auth-msg" id="authMsg"></div>
    <button class="auth-switch" id="authSwitch" type="button">계정이 없으신가요? — 회원가입</button>
    <p class="auth-note" id="authNote"></p>
  </div>
</div>

<!-- ════════════════════════ APP ════════════════════════ -->
<div id="app" class="app" hidden>

  <!-- ─────────── SIDEBAR ─────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="sidebar-toggle" id="sidebarToggle" title="사이드바 접기/펼치기" aria-label="사이드바 접기/펼치기">
        <svg viewBox="0 0 24 24" class="icon"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="wordmark" id="wordmark">필사</span>
      <span class="sync-dot" id="syncDot" title=""></span>
    </div>

    <nav class="sidebar-actions">
      <button class="action action--primary" id="newEntryBtn">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 5v14M5 12h14"/></svg>
        <span>새 문서</span><kbd>⌘N</kbd>
      </button>
      <button class="action" data-route="#search" id="searchBtn">
        <svg viewBox="0 0 24 24" class="icon"><circle cx="11" cy="11" r="7"/><path d="m20.5 20.5-4.2-4.2"/></svg>
        <span>검색</span><kbd>⌘K</kbd>
      </button>
      <button class="action" data-route="#words" id="wordsBtn">
        <svg viewBox="0 0 24 24" class="icon"><path d="M5 4h10a3 3 0 0 1 3 3v13H7a2 2 0 0 0-2 2V4z"/><path d="M5 4a2 2 0 0 0-2 2v14a2 2 0 0 1 2-2"/><path d="M9 9h6M9 13h4"/></svg>
        <span>나의 단어</span><span class="action-count" id="wordsCount"></span>
      </button>
      <button class="action" data-route="#sentences" id="sentencesBtn">
        <svg viewBox="0 0 24 24" class="icon"><path d="M4 6h16M4 11h16M4 16h9"/><path d="M14.5 19.5 17 17l4 4-2.5 2.5z" transform="translate(-1 -4)"/></svg>
        <span>나의 문장</span><span class="action-count" id="sentencesCount"></span>
      </button>
      <button class="action" data-route="#thoughts" id="thoughtsBtn">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 3a7 7 0 0 0-4 12.7V19a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-3.3A7 7 0 0 0 12 3z"/><path d="M10 22h4"/></svg>
        <span>나의 생각</span><span class="action-count" id="thoughtsCount"></span>
      </button>
      <button class="action" data-route="#projects" id="projectsBtn">
        <svg viewBox="0 0 24 24" class="icon"><rect x="3" y="4" width="7" height="7" rx="1"/><rect x="14" y="4" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>프로젝트</span><span class="action-count" id="projectsCount"></span>
      </button>
    </nav>

    <div class="sidebar-recent">
      <div class="recent-label">최근</div>
      <ul class="recent-list" id="recentList"></ul>
    </div>

    <div class="sidebar-footer">
      <button class="ghost-btn" id="exportBtn" title="JSON 백업 내보내기">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg><span>백업</span>
      </button>
      <button class="ghost-btn" id="importBtn" title="JSON 백업 가져오기">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 21V9m0 0 4 4m-4-4-4 4M5 3h14"/></svg><span>가져오기</span>
      </button>
      <button class="ghost-btn" id="signOutBtn" title="로그아웃">
        <svg viewBox="0 0 24 24" class="icon"><path d="M14 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-2M9 12h12m0 0-3-3m3 3-3 3"/></svg>
      </button>
      <input type="file" id="importInput" accept="application/json,.json" hidden />
    </div>
  </aside>

  <button class="sidebar-reopen" id="sidebarReopen" hidden aria-label="사이드바 열기" title="사이드바 열기">
    <svg viewBox="0 0 24 24" class="icon"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <!-- ─────────── MAIN ─────────── -->
  <main class="main" id="main">

    <!-- EMPTY STATE -->
    <section class="empty-state view" id="emptyState" hidden>
      <div class="empty-mark">필사</div>
      <p class="empty-text">아직 문서가 없습니다.<br/>한 구절을 옮겨 적거나, 한 문단을 직접 적는 일에서 시작합니다.</p>
      <button class="action action--primary empty-cta" id="emptyNewBtn">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 5v14M5 12h14"/></svg><span>첫 문서 시작하기</span>
      </button>
    </section>

    <!-- DAILY: ENTRY -->
    <article class="entry view" id="entryView" hidden>
      <header class="entry-head">
        <div class="entry-meta">
          <input type="date" class="entry-date" id="entryDate" />
          <span class="entry-weekday" id="entryWeekday"></span>
          <span class="entry-status" id="entryStatus"></span>
          <button class="entry-delete" id="deleteEntryBtn" title="이 필사 삭제">
            <svg viewBox="0 0 24 24" class="icon"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/></svg>
          </button>
        </div>
        <div class="entry-source">
          <input class="src src-author" id="srcAuthor" placeholder="저자" autocomplete="off" />
          <span class="src-dot">·</span>
          <input class="src src-title" id="srcTitle" placeholder="작품 제목" autocomplete="off" />
          <span class="src-dot">·</span>
          <input class="src src-page" id="srcPage" placeholder="쪽" autocomplete="off" />
        </div>
      </header>

      <div class="entry-divider"></div>

      <!-- BODY -->
      <section class="block block--body">
        <div class="text-field" id="bodyField">
          <div class="body-render" id="bodyRender" tabindex="0"></div>
          <div class="body-edit-wrap" id="bodyEditWrap" hidden>
            <div class="text-backdrop" id="bodyBackdrop" aria-hidden="true"></div>
            <textarea class="text-input body-input" id="bodyInput" spellcheck="false"
              placeholder="여기에 영어 원문을 손으로 옮겨 적습니다."></textarea>
          </div>
          <div class="hl-toolbar" id="hlToolbar" hidden>
            <button class="hl-btn hl-btn--yellow" data-type="yellow" title="모르는 단어 (⌘1)"><span class="swatch"></span>단어</button>
            <button class="hl-btn hl-btn--blue" data-type="blue" title="불분명한 구절·문체 (⌘2)"><span class="swatch"></span>구절</button>
            <button class="hl-btn hl-btn--ask" data-type="ask" title="이 부분 Claude에게 묻기"><span class="tri">△</span>묻기</button>
            <button class="hl-btn hl-btn--clear" data-type="clear" title="표시 지우기" hidden>지우기</button>
          </div>
          <div class="slash-menu" id="slashMenu" hidden>
            <ul class="slash-menu-list" id="slashMenuList"></ul>
          </div>
        </div>
        <div class="body-hint" id="bodyHint">클릭해서 편집 · 드래그해서 표시 · <kbd>/</kbd>로 블록 추가</div>
      </section>

      <!-- INTERPRETATION -->
      <section class="block block--interp">
        <div class="interp-rail"></div>
        <div class="interp-wrap">
          <textarea class="text-input interp-input" id="interpInput"
            placeholder="→ 한국어로 옮기거나, 읽으며 떠오른 것을 적습니다. 헷갈리는 건 그대로 적어 두고 ⌘↵ 로 Claude에게 보내면, 답과 함께 단어·문장을 노트에 모아 둡니다."></textarea>
          <div class="interp-foot">
            <button class="interp-send" id="interpSend" type="button" title="해석·질문을 Claude에게 보내기 (⌘↵)">
              <span class="tri">△</span><span class="interp-send-label">Claude에게 보내기</span><kbd>⌘↵</kbd>
            </button>
            <button class="interp-revisions" id="interpRevisions" hidden></button>
          </div>
        </div>
      </section>

      <!-- CLAUDE PANEL -->
      <section class="claude-panel" id="claudePanel">
        <button class="claude-head" id="claudeHead">
          <span class="claude-tri">△</span>
          <span class="claude-title" id="claudeTitle">Claude 대화</span>
          <span class="claude-chevron" id="claudeChevron">▾</span>
        </button>
        <div class="claude-body" id="claudeBody" hidden>
          <div class="thread-list" id="threadList"></div>
          <div class="claude-compose" id="claudeCompose">
            <textarea class="claude-compose-input" id="claudeInput" rows="1"
              placeholder="이 필사에 대해 Claude에게 묻기… (단어 뜻 · 문체 · 내 해석/문법 봐주기)"></textarea>
            <button class="claude-send" id="claudeSend" title="보내기 (⌘↵)">
              <svg viewBox="0 0 24 24" class="icon"><path d="M5 12h14m0 0-6-6m6 6-6 6"/></svg>
            </button>
          </div>
          <div class="claude-warn" id="claudeWarn" hidden></div>
        </div>
      </section>
    </article>

    <!-- DAILY: REFLECTION ENTRY (사유) -->
    <article class="entry view reflect" id="reflectView" hidden>
      <header class="entry-head">
        <div class="entry-meta">
          <input type="date" class="entry-date" id="reflectDate" />
          <span class="entry-weekday" id="reflectWeekday"></span>
          <span class="entry-status" id="reflectStatus"></span>
          <button class="entry-delete" id="reflectDeleteBtn" title="이 사유 삭제">
            <svg viewBox="0 0 24 24" class="icon"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/></svg>
          </button>
        </div>
        <div class="entry-source">
          <input class="src src-author" id="reflectAuthor" placeholder="저자 · 선택" autocomplete="off" />
          <span class="src-dot">·</span>
          <input class="src src-title" id="reflectTitle" placeholder="책 · 주제 · 맥락 (선택)" autocomplete="off" />
        </div>
      </header>

      <div class="entry-divider"></div>

      <!-- mode toggle (only correct enabled for now) -->
      <div class="reflect-modes" id="reflectModes">
        <button type="button" class="reflect-mode is-on" data-mode="correct" title="문법·표현 교정">correct</button>
        <button type="button" class="reflect-mode is-disabled" data-mode="expand" disabled title="(곧) 교정 + 대안 표현 + 요지">expand</button>
        <button type="button" class="reflect-mode is-disabled" data-mode="deep" disabled title="(곧) 교정 + 대안 + 요지 + 되묻는 질문">deep</button>
        <span class="reflect-mode-desc" id="reflectModeDesc">문법·표현 교정과 한국어 설명</span>
      </div>

      <!-- body: my own writing -->
      <section class="block block--reflect-body">
        <textarea class="reflect-body" id="reflectBody" spellcheck="false"
          placeholder="여기에 사유를 적습니다. 영어든 한국어든, 섞어 써도 좋습니다.&#10;⌘↵ 로 Claude에게 보내면, 같은 언어로 다듬은 교정본과 한국어로 된 지적이 아래에 옵니다."></textarea>
        <div class="reflect-foot">
          <button class="reflect-send" id="reflectSend" type="button" title="Claude에게 보내기 (⌘↵)">
            <span class="tri">△</span><span class="reflect-send-label">Claude에게 보내기</span><kbd>⌘↵</kbd>
          </button>
          <span class="reflect-rev-count" id="reflectRevCount"></span>
        </div>
      </section>

      <!-- response panel -->
      <section class="reflect-response" id="reflectResponse" hidden>
        <div class="reflect-resp-h">교정</div>
        <div class="reflect-corrected" id="reflectCorrected"></div>

        <div class="reflect-resp-h" id="reflectErrorsH" hidden>지적</div>
        <ul class="reflect-errors" id="reflectErrors"></ul>

        <div class="reflect-resp-foot">
          <span class="reflect-resp-ts" id="reflectRespTs"></span>
        </div>
      </section>
    </article>

    <!-- 나의 단어 (dictionary) -->
    <section class="page view" id="wordsView" hidden>
      <header class="page-head">
        <h1 class="page-title">나의 단어</h1>
        <p class="page-sub" id="wordsSub"></p>
        <div class="page-tools">
          <input class="page-search" id="wordsFilter" placeholder="단어 거르기…" />
          <div class="seg" id="wordsSort">
            <button data-sort="recent" class="is-on">최근순</button>
            <button data-sort="count">빈도순</button>
            <button data-sort="alpha">가나다·ABC</button>
          </div>
        </div>
      </header>
      <div class="words-grid" id="wordsGrid"></div>
    </section>

    <!-- 나의 문장 (sentences / Claude feedback archive) -->
    <section class="page view" id="sentencesView" hidden>
      <header class="page-head">
        <h1 class="page-title">나의 문장</h1>
        <p class="page-sub" id="sentencesSub"></p>
        <div class="page-tools">
          <input class="page-search" id="sentencesFilter" placeholder="문장·출처·내용 거르기…" />
        </div>
      </header>
      <div class="sentence-list" id="sentenceList"></div>
    </section>

    <!-- 프로젝트 (grouped by source author/title) -->
    <section class="page view projects-view" id="projectsView" hidden>
      <header class="projects-head">
        <h1 class="projects-title">프로젝트</h1>
        <div class="projects-head-tools">
          <span class="projects-sort-label">정렬 기준</span>
          <select class="projects-sort" id="projectsSort">
            <option value="activity">활동</option>
            <option value="name">이름</option>
            <option value="count">엔트리 수</option>
          </select>
          <button class="projects-new" id="projectsNewBtn" type="button">+ 새 프로젝트</button>
        </div>
      </header>
      <div class="projects-tools-row">
        <div class="seg" id="projectsKindFilter">
          <button data-kind="all" class="is-on">전체</button>
          <button data-kind="transcription">필사</button>
          <button data-kind="reflection">사유</button>
        </div>
      </div>
      <div class="projects-search">
        <svg viewBox="0 0 24 24" class="icon"><circle cx="11" cy="11" r="7"/><path d="m20.5 20.5-4.2-4.2"/></svg>
        <input class="projects-search-input" id="projectsFilter" placeholder="프로젝트 검색" />
      </div>
      <div class="projects-grid" id="projectsGrid"></div>
    </section>

    <!-- 프로젝트 상세 (한 프로젝트 = 아트 모드 아카이브) -->
    <section class="page view project-detail art-view" id="projectDetailView" hidden>
      <div class="project-detail-bar">
        <button class="project-back" id="projectBackBtn" type="button">
          <svg viewBox="0 0 24 24" class="icon"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
          <span>프로젝트</span>
        </button>
        <button class="art-tool" id="projectCuratorEditBtn">큐레이터 노트</button>
      </div>
      <div class="art-scroll" id="projectArtScroll"></div>
    </section>

    <!-- 나의 생각 (reflection archive) -->
    <section class="page view" id="thoughtsView" hidden>
      <header class="page-head">
        <h1 class="page-title">나의 생각</h1>
        <p class="page-sub" id="thoughtsSub"></p>
        <div class="page-tools">
          <input class="page-search" id="thoughtsFilter" placeholder="본문·출처·교정 거르기…" />
        </div>
      </header>
      <div class="thought-list" id="thoughtList"></div>
    </section>

  </main>
</div>

<!-- ════════════════════════ SEARCH MODAL ════════════════════════ -->
<div class="search-scrim" id="searchScrim" hidden>
  <div class="search-box" role="dialog" aria-modal="true">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" class="icon"><circle cx="11" cy="11" r="7"/><path d="m20.5 20.5-4.2-4.2"/></svg>
      <input class="search-input" id="searchInput" placeholder="원문 · 해석 · 출처 · Claude 대화 검색…" />
      <button class="search-close" id="searchClose" aria-label="닫기"><svg viewBox="0 0 24 24" class="icon"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
    </div>
    <div class="search-filters" id="searchFilters">
      <span class="chip-group" id="chipColor">
        <button class="chip" data-color="yellow"><span class="dot dot-y"></span>단어 하이라이트</button>
        <button class="chip" data-color="blue"><span class="dot dot-b"></span>구절 하이라이트</button>
      </span>
      <button class="chip" id="chipClaude">△ Claude 대화 있음</button>
      <span class="chip-group">
        <input class="chip-date" id="chipFrom" type="date" title="이후" />
        <span class="chip-tilde">~</span>
        <input class="chip-date" id="chipTo" type="date" title="이전" />
      </span>
      <input class="chip-text" id="chipAuthor" placeholder="저자" />
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- ════════════════════════ GENERIC MODAL ════════════════════════ -->
<div class="modal-scrim" id="modalScrim" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="닫기"><svg viewBox="0 0 24 24" class="icon"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions" hidden></div>
  </div>
</div>

<!-- floating word tooltip -->
<div class="word-tip" id="wordTip" hidden></div>
<div class="toast" id="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
